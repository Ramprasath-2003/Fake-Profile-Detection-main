<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Fake Profile Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrapper{display:flex;align-items:center;justify-content:center;gap:60px;max-width:900px;width:100%;padding:24px}
    .brand{text-align:center;max-width:360px}
    .brand .logo{width:72px;height:72px;background:linear-gradient(135deg,#1a56db,#3b82f6);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 24px rgba(26,86,219,.25)}
    .brand .logo i{font-size:2rem;color:#fff}
    .brand h1{font-size:1.8rem;color:#111827;font-weight:700;margin-bottom:8px}
    .brand p{color:#6b7280;font-size:.95rem;line-height:1.6}
    .login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06)}
    .login-card h2{font-size:1.4rem;color:#111827;margin-bottom:4px;font-weight:700}
    .login-card .subtitle{color:#6b7280;font-size:.88rem;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:.82rem;color:#374151;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .form-group .input-wrapper{position:relative}
    .form-group .input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.9rem}
    .form-group .input-wrapper input{width:100%;padding:11px 16px 11px 42px;border-radius:10px;border:1.5px solid #e5e7eb;background:#f9fafb;color:#111827;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
    .form-group .input-wrapper input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);background:#fff}
    .form-group .input-wrapper input::placeholder{color:#9ca3af}
    .btn-login{width:100%;padding:12px;border:none;border-radius:10px;background:#1a56db;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;margin-top:8px;font-family:inherit}
    .btn-login:hover{background:#1e40af}
    .btn-login:active{transform:scale(.98)}
    .error-msg{background:#fef2f2;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:20px;border:1px solid #fecaca;display:flex;align-items:center;gap:8px}
    .secure-note{text-align:center;color:#9ca3af;font-size:.78rem;margin-top:16px}
    .secure-note i{margin-right:4px}
    @media(max-width:768px){.login-wrapper{flex-direction:column;gap:32px}.brand{max-width:100%}}
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="brand">
      <div class="logo"><i class="fas fa-shield-halved"></i></div>
      <h1>Fake Profile Detection</h1>
      <p>An intelligent ML-powered system to detect fake and suspicious social media profiles across multiple platforms.</p>
    </div>
    <div class="login-card">
      <h2>Sign In</h2>
      <p class="subtitle">Enter your credentials to continue</p>

      {% if error %}
      <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-arrow-right"></i> &nbsp;Sign In</button>
      </form>
      <p class="secure-note"><i class="fas fa-lock"></i> Secure authentication</p>
    </div>
  </div>
</body>
</html>
